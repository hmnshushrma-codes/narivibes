name            = "narivibe-worker"
main            = "src/index.js"
compatibility_date = "2024-09-01"

# ---------------------------------------------------------------------------
# Non-sensitive environment variables
# ---------------------------------------------------------------------------
[vars]
ALLOWED_ORIGIN = "https://narivibes.oyenino.com,https://narivibes.pages.dev"
ENVIRONMENT    = "production"
FROM_EMAIL = "noreply@narivibes.oyenino.com"  # restore after Resend domain is verified


# ---------------------------------------------------------------------------
# Secrets — set via setup-secrets.sh (never commit secret values)
#   RAZORPAY_KEY_ID
#   RAZORPAY_KEY_SECRET
#   TURNSTILE_SECRET_KEY
#   RESEND_API_KEY
#   ADMIN_SECRET
#   ALLOWED_ADMIN_EMAIL
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Cloudflare D1 — SQLite database
# ---------------------------------------------------------------------------
[[d1_databases]]
binding       = "DB"
database_name = "narivibe-db"
database_id   = "e4a09f5f-f041-40c9-96d4-bfa2a1e64d8d"

# ---------------------------------------------------------------------------
# Cloudflare KV — OTP + session storage
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "OTP_STORE"
id      = "567754178ce446c8af72dc9184bf1f28"