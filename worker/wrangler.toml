name            = "narivibe-worker"
main            = "src/index.js"
compatibility_date = "2024-09-01"

# ---------------------------------------------------------------------------
# Environment variables (non-secret, safe to commit)
# Replace sensitive values with wrangler secrets in production:
#   wrangler secret put RAZORPAY_KEY_SECRET
# ---------------------------------------------------------------------------
[vars]
RAZORPAY_KEY_ID      = "rzp_test_YOUR_KEY_ID"        # TODO: replace with live key in prod
RAZORPAY_KEY_SECRET  = "YOUR_KEY_SECRET"              # TODO: set via `wrangler secret put`
ALLOWED_ORIGIN       = "http://localhost:8080"        # TODO: update to production domain
ENVIRONMENT          = "development"                  # "production" in prod deployment

# Admin panel credentials
# ALLOWED_ADMIN_EMAIL: comma-separated list of emails allowed to access admin
# ADMIN_SECRET: secret key required alongside email to request OTP
# Set sensitive values via wrangler secrets:
#   wrangler secret put ADMIN_SECRET
ALLOWED_ADMIN_EMAIL  = "admin@narivibe.com"           # TODO: replace with real admin email
ADMIN_SECRET         = "YOUR_ADMIN_SECRET_KEY"        # TODO: set via `wrangler secret put`

# ---------------------------------------------------------------------------
# Cloudflare D1 — SQLite database
# Run: wrangler d1 create narivibe-db  →  copy the database_id below
# ---------------------------------------------------------------------------
[[d1_databases]]
binding       = "DB"
database_name = "narivibe-db"
database_id   = "YOUR_D1_DATABASE_ID"            # TODO: replace after `wrangler d1 create`

# ---------------------------------------------------------------------------
# Cloudflare KV — OTP + session storage
# Run: wrangler kv:namespace create OTP_STORE  →  copy the id below
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "OTP_STORE"
id      = "YOUR_KV_NAMESPACE_ID"                 # TODO: replace after `wrangler kv:namespace create`

# ---------------------------------------------------------------------------
# Production environment overrides
# ---------------------------------------------------------------------------
[env.production]
[env.production.vars]
ENVIRONMENT    = "production"
ALLOWED_ORIGIN = "https://narivibe.com"          # TODO: replace with actual production domain
